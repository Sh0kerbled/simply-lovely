<!doctype html>
<html lang="en">
  <head>
    {%load static%}
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="{%static 'dist/style.css'%}" />
    <title>{%block title%}Simply Lovely{%endblock%}</title>
  </head>
  <body>
    <header
      class="sticky top-0 z-50 w-full border-b border-gray-200 bg-white/95 backdrop-blur supports-[backdrop-filter]:bg-white/60"
    >
      <div
        class="container mx-auto flex h-16 items-center justify-between px-4 lg:px-8"
      >
        <a href="/" class="flex items-center space-x-2">
          <img
            src="{%static 'img/LogoBlack.jpg'%}"
            class="h-8 w-8 rounded-lg"
            alt=""
          />
          <span class="text-xl font-medium tracking-tight text-gray-900"
            >Simply Lovely</span
          >
        </a>
        <div class="hidden flex-1 items-center justify-center gap-8 lg:flex">
          <div class="relative w-full max-w-md">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-gray-500"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.3-4.3"></path>
            </svg>
            <input
              type="text"
              placeholder="Search products..."
              class="flex h-10 w-full rounded-md border border-transparent bg-gray-100/80 px-3 py-2 pl-10 text-sm placeholder:text-gray-500 focus:border-gray-300 focus:bg-white focus:outline-none focus:ring-2 focus:ring-gray-400 focus:ring-offset-2"
            />
          </div>
          <div class="group relative">
            <button
              class="inline-flex h-10 items-center justify-center rounded-md px-4 py-2 text-sm font-medium text-gray-700 transition-colors hover:bg-gray-100 hover:text-gray-900"
            >
              Categories
            </button>
            <div
              class="invisible absolute left-1/2 top-full mt-1 w-48 -translate-x-1/2 rounded-md border border-gray-200 bg-white p-1 text-gray-700 opacity-0 shadow-md transition-all group-hover:visible group-hover:opacity-100"
            >
              <a
                href="#"
                class="block cursor-pointer rounded-sm px-2 py-1.5 text-sm hover:bg-gray-100 hover:text-gray-900"
                >Fashion</a
              >
              <a
                href="#"
                class="block cursor-pointer rounded-sm px-2 py-1.5 text-sm hover:bg-gray-100 hover:text-gray-900"
                >Electronics</a
              >
              <a
                href="#"
                class="block cursor-pointer rounded-sm px-2 py-1.5 text-sm hover:bg-gray-100 hover:text-gray-900"
                >Home & Living</a
              >
              <a
                href="#"
                class="block cursor-pointer rounded-sm px-2 py-1.5 text-sm hover:bg-gray-100 hover:text-gray-900"
                >Beauty</a
              >
              <a
                href="#"
                class="block cursor-pointer rounded-sm px-2 py-1.5 text-sm hover:bg-gray-100 hover:text-gray-900"
                >Sports</a
              >
            </div>
          </div>
        </div>

        <div class="flex items-center gap-2">
          <button
            class="hidden h-10 w-10 items-center justify-center rounded-md text-gray-700 transition-colors hover:bg-gray-100 hover:text-gray-900 lg:inline-flex"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
            </svg>
          </button>

          <a
            href="/dashboard"
            class="inline-flex h-10 w-10 items-center justify-center rounded-md text-gray-700 transition-colors hover:bg-gray-100 hover:text-gray-900"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
          </a>

          <button
            class="relative inline-flex h-10 w-10 items-center justify-center rounded-md text-gray-700 transition-colors hover:bg-gray-100 hover:text-gray-900"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="8" cy="21" r="1"></circle>
              <circle cx="19" cy="21" r="1"></circle>
              <path
                d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"
              ></path>
            </svg>
            <!-- Badge -->
            <span
              class="absolute -right-1 -top-1 flex h-5 w-5 items-center justify-center rounded-full bg-gray-900 text-[10px] font-bold text-white"
            >
              3
            </span>
          </button>

          <!-- Mobile Menu Trigger -->
          <button
            class="inline-flex h-10 w-10 items-center justify-center rounded-md text-gray-700 transition-colors hover:bg-gray-100 hover:text-gray-900 lg:hidden"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="4" x2="20" y1="12" y2="12"></line>
              <line x1="4" x2="20" y1="6" y2="6"></line>
              <line x1="4" x2="20" y1="18" y2="18"></line>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <!-- ============================================== -->
    <!-- MOBILE MENU SHEET (Скрыто по умолчанию)        -->
    <!-- В Vue оборачивается в <transition> и v-if      -->
    <!-- ============================================== -->

    <!-- Backdrop Overlay (Снимите класс 'hidden' для отображения) -->
    <div class="fixed inset-0 z-50 hidden bg-black/80 backdrop-blur-sm"></div>

    <!-- Sidebar Sheet (Снимите класс 'hidden' для отображения) -->
    <div
      class="fixed inset-y-0 right-0 z-50 hidden w-80 flex-col overflow-y-auto border-l border-gray-200 bg-white p-6 shadow-lg"
    >
      <nav class="mt-8 flex flex-col gap-4">
        <!-- Mobile Search -->
        <div class="relative">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-gray-500"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.3-4.3"></path>
          </svg>
          <input
            type="text"
            placeholder="Search products..."
            class="flex h-10 w-full rounded-md border border-gray-200 bg-white px-3 py-2 pl-10 text-sm placeholder:text-gray-500 focus:border-gray-300 focus:outline-none focus:ring-2 focus:ring-gray-400"
          />
        </div>

        <!-- Mobile Categories -->
        <div class="flex flex-col gap-2">
          <h3 class="px-2 py-2 font-medium text-gray-900">Categories</h3>
          <button
            class="inline-flex h-10 w-full items-center justify-start rounded-md px-4 py-2 text-sm text-gray-700 transition-colors hover:bg-gray-100 hover:text-gray-900"
          >
            Fashion
          </button>
          <button
            class="inline-flex h-10 w-full items-center justify-start rounded-md px-4 py-2 text-sm text-gray-700 transition-colors hover:bg-gray-100 hover:text-gray-900"
          >
            Electronics
          </button>
          <button
            class="inline-flex h-10 w-full items-center justify-start rounded-md px-4 py-2 text-sm text-gray-700 transition-colors hover:bg-gray-100 hover:text-gray-900"
          >
            Home & Living
          </button>
          <button
            class="inline-flex h-10 w-full items-center justify-start rounded-md px-4 py-2 text-sm text-gray-700 transition-colors hover:bg-gray-100 hover:text-gray-900"
          >
            Beauty
          </button>
          <button
            class="inline-flex h-10 w-full items-center justify-start rounded-md px-4 py-2 text-sm text-gray-700 transition-colors hover:bg-gray-100 hover:text-gray-900"
          >
            Sports
          </button>
        </div>

        <button
          class="inline-flex h-10 w-full items-center justify-start rounded-md px-4 py-2 text-sm text-gray-700 transition-colors hover:bg-gray-100 hover:text-gray-900"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="mr-2 h-5 w-5"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
          </svg>
          Dark Mode
        </button>
      </nav>
    </div>

    {%block content%}{%endblock%}
  </body>
</html>
