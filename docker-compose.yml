version: '3.9'

services:
  backend:
    container_name: simply_backend
    
    build:
      context: .
      dockerfile: Dockerfile

    command: python manage.py runserver 0.0.0.0:8000
    
    volumes:
      - .:/app  
    
    working_dir: /app
    
    ports:
      - "8000:8000"  

  postgres:
    image: postgres:latest
    container_name: simply_db
    environment:
      POSTGRES_USER: dauren
      POSTGRES_PASSWORD: '4252642526'
      POSTGRES_DB: simply
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5430:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data/pgdata
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    command: >
      postgres -c max_connections=1000
               -c shared_buffers=256MB
               -c effective_cache_size=768MB
               -c maintenance_work_mem=64MB
               -c checkpoint_completion_target=0.7
               -c wal_buffers=16MB
               -c default_statistics_target=100
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U dauren -d simply" ]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    tty: true
    stdin_open: true

volumes:
  pgdata:
    driver: local